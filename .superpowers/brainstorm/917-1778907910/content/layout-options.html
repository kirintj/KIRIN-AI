<h2>表单→结果 替换方案</h2>

<div class="cards">
  <div class="card" data-choice="current" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid #e5e7eb;">
        <div style="font-size:12px;color:#666;margin-bottom:8px;">表单区域</div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;height:24px;background:#e8f0ff;border-radius:4px;"></div>
          <div style="flex:1;height:24px;background:#e8f0ff;border-radius:4px;"></div>
        </div>
        <div style="margin-top:8px;text-align:right;">
          <div style="display:inline-block;width:60px;height:24px;background:#0A59F7;border-radius:12px;"></div>
        </div>
      </div>
      <div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #e5e7eb;">
        <div style="font-size:12px;color:#666;margin-bottom:8px;">结果区域（下方）</div>
        <div style="height:40px;background:#f0fdf4;border-radius:4px;"></div>
      </div>

    <div class="card-body">
      <h3>A. 当前布局</h3>
      <p>表单在上，结果在下，始终同时可见。占空间大。</p>

  </div>

  <div class="card" data-choice="slide-replace" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #e5e7eb;position:relative;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <div style="width:20px;height:20px;background:#0A59F7;border-radius:50%;display:flex;align-items:center;justify-content:center;">
            <span style="color:#fff;font-size:11px;">←</span>
          </div>
          <div style="font-size:12px;color:#0A59F7;font-weight:500;">返回修改</div>
        </div>
        <div style="font-size:12px;color:#666;margin-bottom:8px;">AI结果（完全替换表单）</div>
        <div style="height:80px;background:#f0fdf4;border-radius:4px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 滑入替换</h3>
      <p>结果直接替换表单位置。左上角"返回修改"按钮恢复表单。动画过渡。</p>
    </div>
  </div>

  <div class="card" data-choice="collapse-summary" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:8px;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;">

          <div style="font-size:11px;color:#0A59F7;">▾</div>
          <div style="font-size:11px;color:#666;">表单摘要：腾讯 · 后端开发 · 技术面</div>
        </div>
        <div style="font-size:11px;color:#0A59F7;">展开编辑</div>
      </div>
      <div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #e5e7eb;">
        <div style="font-size:12px;color:#666;margin-bottom:8px;">AI结果</div>
        <div style="height:70px;background:#f0fdf4;border-radius:4px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 折叠摘要</h3>
      <p>表单折叠为单行摘要条，结果在下方展开。可展开摘要修改参数。</p>
    </div>
  </div>
</div>

<div style="margin-top:24px;padding:16px;background:#fffbeb;border-radius:8px;border:1px solid #fde68a;">
  <p style="margin:0;font-size:13px;color:#92400e;"><strong>推荐方案 B</strong> — 滑入替换。视觉最干净，结果获得最大展示空间，"返回修改"保持可逆性。对5个tab统一适用。</p>
</div>
