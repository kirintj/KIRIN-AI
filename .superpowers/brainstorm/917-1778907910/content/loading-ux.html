<h2>AI生成加载体验</h2>
<p class="subtitle">点击提交后到结果出现前，展示什么？</p>

<div class="cards">
  <div class="card" data-choice="skeleton" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:rgba(255,255,255,0.72);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.6);border-radius:16px;padding:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <div style="width:28px;height:28px;background:rgba(10,89,247,0.1);border-radius:8px;"></div>
          <div style="height:14px;width:100px;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:4px;animation:shimmer 1.5s infinite;"></div>
        </div>
        <div style="background:#fff;border-radius:12px;padding:16px;border:1px solid rgba(0,0,0,0.06);">
          <div style="height:10px;width:70%;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:4px;margin-bottom:12px;animation:shimmer 1.5s infinite;"></div>
          <div style="height:10px;width:100%;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:4px;margin-bottom:12px;animation:shimmer 1.5s infinite;"></div>
          <div style="height:10px;width:55%;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:4px;margin-bottom:16px;animation:shimmer 1.5s infinite;"></div>
          <div style="display:flex;gap:6px;">
            <div style="height:22px;width:60px;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:999px;animation:shimmer 1.5s infinite;"></div>
            <div style="height:22px;width:70px;background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;border-radius:999px;animation:shimmer 1.5s infinite;"></div>
          </div>
        </div>
      </div>
      <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
    </div>
    <div class="card-body">
      <h3>A. 骨架屏</h3>
      <p>模拟结果卡片结构的shimmer骨架。用户能预判结果形态，过渡自然。</p>
    </div>
  </div>

  <div class="card" data-choice="center-spinner" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:rgba(255,255,255,0.72);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.6);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;">
        <div style="width:48px;height:48px;border:3px solid #e8f0ff;border-top-color:#0A59F7;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="margin-top:16px;font-size:14px;color:rgba(0,0,0,0.6);">AI正在分析中...</p>
        <div style="display:flex;gap:4px;margin-top:8px;">
          <div style="width:6px;height:6px;background:#0A59F7;border-radius:50%;animation:bounce 1.4s ease-in-out infinite;"></div>
          <div style="width:6px;height:6px;background:#0A59F7;border-radius:50%;animation:bounce 1.4s ease-in-out 0.2s infinite;"></div>
          <div style="width:6px;height:6px;background:#0A59F7;border-radius:50%;animation:bounce 1.4s ease-in-out 0.4s infinite;"></div>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}</style>
    </div>
    <div class="card-body">
      <h3>B. 居中加载</h3>
      <p>表单消失，居中显示旋转+文字提示。简洁但用户无法预判结果形态。</p>
    </div>
  </div>

  <div class="card" data-choice="inline-progress" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f5f7fa;border-radius:8px;">
      <div style="background:rgba(255,255,255,0.72);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.6);border-radius:16px;padding:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <div style="width:28px;height:28px;background:rgba(10,89,247,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <span style="color:#0A59F7;font-size:14px;">✨</span>
          </div>
          <span style="font-size:15px;font-weight:600;color:rgba(0,0,0,0.9);">AI分析结果</span>
        </div>
        <div style="background:#fff;border-radius:12px;padding:16px;border:1px solid rgba(0,0,0,0.06);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="flex:1;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;">
              <div style="width:65%;height:100%;background:linear-gradient(90deg,#0A59F7,#337BF7);border-radius:2px;animation:progress 2s ease-in-out infinite;"></div>
            </div>
            <span style="font-size:12px;color:#0A59F7;white-space:nowrap;">分析中 65%</span>
          </div>
          <div style="font-size:13px;color:rgba(0,0,0,0.38);display:flex;align-items:center;gap:6px;">
            <div style="width:14px;height:14px;border:2px solid #e8f0ff;border-top-color:#0A59F7;border-radius:50%;animation:spin 1s linear infinite;"></div>
            正在匹配技能关键词...
          </div>
        </div>
      </div>
      <style>@keyframes progress{0%{width:30%}50%{width:80%}100%{width:30%}}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <div class="card-body">
      <h3>C. 内嵌进度</h3>
      <p>结果卡片框架先出现，内含进度条+步骤提示。表单不消失，渐进填充。</p>
    </div>
  </div>
</div>

<div style="margin-top:24px;padding:16px;background:#fffbeb;border-radius:8px;border:1px solid #fde68a;">
  <p style="margin:0;font-size:13px;color:#92400e;"><strong>推荐方案 A</strong> — 骨架屏。与结果卡片结构一致，过渡最自然。全局已有 `.hm-skeleton` 动画体系可复用。</p>
</div>
